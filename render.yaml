# Render Blueprint. In Render: New + → Blueprint → pick this repo, then fill in
# the secret values (sync: false) in the dashboard.
services:
  - type: web
    name: bici-klaviyo-inventory-feed
    runtime: python
    # "starter" is always-on (no spin-down / cold starts), so the Klaviyo feed
    # responds instantly at send time. With this plan the keep-alive GitHub
    # Action is unnecessary and can be deleted. ("free" also works but sleeps
    # after ~15 min idle and would need the keep-alive pinger.)
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: SHOPIFY_STORE
        sync: false
      - key: SHOPIFY_ADMIN_TOKEN # shpat_... with read_products
        sync: false
      - key: FEED_TOKEN # shared secret added to the Klaviyo feed URL
        sync: false
