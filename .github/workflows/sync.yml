name: Sync inventory to Klaviyo

# Hourly, plus a manual "Run workflow" button. Public repo => unlimited free
# Actions minutes, so hourly is fine.
on:
  schedule:
    - cron: "0 * * * *" # top of every hour (UTC)
  workflow_dispatch: {}

# Don't let a slow run overlap the next scheduled run.
concurrency:
  group: klaviyo-inventory-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Run sync
        env:
          SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_ADMIN_TOKEN: ${{ secrets.SHOPIFY_ADMIN_TOKEN }}
          KLAVIYO_API_KEY: ${{ secrets.KLAVIYO_API_KEY }}
        run: python sync.py
